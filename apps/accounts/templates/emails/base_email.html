<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>{% block title %}MediaFlow{% endblock %}</title>
    
    <style>
        /* Reset styles for email clients */
        body, table, td, p, div, span { 
            margin: 0; 
            padding: 0; 
            border: 0; 
            outline: 0; 
            font-size: 100%; 
            vertical-align: baseline; 
            background: transparent; 
        }
        
        body {
            background-color: #f8f9fa;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            font-size: 16px;
            line-height: 1.6;
            color: #333333;
            -webkit-text-size-adjust: 100%;
            -ms-text-size-adjust: 100%;
        }
        
        .email-container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        .email-header {
            background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
            padding: 40px 20px;
            text-align: center;
            color: #ffffff;
        }
        
        .email-header h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 300;
            letter-spacing: -0.5px;
        }
        
        .email-body {
            padding: 40px 20px;
            text-align: center;
        }
        
        .email-footer {
            background-color: #f8f9fa;
            padding: 20px;
            text-align: center;
            font-size: 14px;
            color: #6c757d;
            border-top: 1px solid #e9ecef;
        }
        
        .code-display {
            font-size: 36px;
            font-weight: 700;
            color: #007bff;
            background-color: #f8f9fa;
            padding: 24px 32px;
            margin: 32px auto;
            border-radius: 8px;
            border: 2px solid #e9ecef;
            letter-spacing: 8px;
            display: inline-block;
            font-family: 'Courier New', Courier, monospace;
        }
        
        .security-notice {
            background-color: #fff3cd;
            border: 1px solid #ffeaa7;
            border-radius: 6px;
            padding: 16px;
            margin: 24px auto;
            max-width: 400px;
            font-size: 14px;
            color: #856404;
        }
        
        .security-notice .icon {
            display: inline-block;
            margin-right: 8px;
            font-size: 16px;
        }
        
        .button {
            display: inline-block;
            padding: 12px 24px;
            background-color: #007bff;
            color: #ffffff;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 500;
            margin: 16px 0;
        }
        
        .button:hover {
            background-color: #0056b3;
        }
        
        .text-muted {
            color: #6c757d;
            font-size: 14px;
        }
        
        .text-center {
            text-align: center;
        }
        
        .mb-2 { margin-bottom: 16px; }
        .mb-3 { margin-bottom: 24px; }
        .mb-4 { margin-bottom: 32px; }
        
        /* Mobile responsive */
        @media screen and (max-width: 600px) {
            .email-container {
                margin: 0;
                border-radius: 0;
                box-shadow: none;
            }
            
            .email-header, .email-body {
                padding: 20px 15px;
            }
            
            .email-header h1 {
                font-size: 24px;
            }
            
            .code-display {
                font-size: 28px;
                padding: 18px 24px;
                letter-spacing: 4px;
            }
        }
    </style>
</head>
<body>
    <div class="email-container">
        <div class="email-header">
            <h1>{% block header_title %}{{ app_name|default:"MediaFlow" }}{% endblock %}</h1>
        </div>
        
        <div class="email-body">
            {% block content %}
            {% endblock %}
        </div>
        
        <div class="email-footer">
            {% block footer %}
            <p class="text-muted">
                Це автоматичне повідомлення від {{ app_name|default:"MediaFlow" }}.<br>
                Не відповідайте на цей email.
            </p>
            {% if site_url %}
            <p class="text-muted">
                <a href="{{ site_url }}" style="color: #6c757d;">{{ site_url }}</a>
            </p>
            {% endif %}
            {% endblock %}
        </div>
    </div>
</body>
</html>

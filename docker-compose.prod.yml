volumes:
  redis_data:
    driver: local
  staticfiles:
    driver: local

x-base: &base-backend
  build:
    context: .
    dockerfile: Dockerfile.prod
  env_file:
    - .env.production
  restart: unless-stopped
  depends_on:
    redis:
      condition: service_healthy

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - "redis_data:/data"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    <<: *base-backend
    command: gunicorn apps.wsgi:application -b 0.0.0.0:8000 -w 3 --timeout 60 --access-logfile -
    volumes:
      - "staticfiles:/code/staticfiles"

  celery-worker:
    <<: *base-backend
    command: celery -A settings worker --loglevel=info --concurrency=2
    healthcheck:
      test: ["CMD-SHELL", "celery -A settings inspect ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  celery-beat:
    <<: *base-backend
    command: celery -A settings beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - "staticfiles:/staticfiles:ro"
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./deploy/certbot-webroot:/var/www/certbot:ro
    depends_on:
      - backend
